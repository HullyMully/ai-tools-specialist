# Синхронизация RetailCRM → Supabase (sync_retailcrm_to_supabase.py)
# Расписание: каждый час в начале часа (UTC).
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_KEY, RETAILCRM_URL, RETAILCRM_API_KEY

name: Sync RetailCRM to Supabase

on:
  schedule:
    # Каждый час в 00 минут (UTC). Для другого часового пояса сместите cron.
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      RETAILCRM_URL: ${{ secrets.RETAILCRM_URL }}
      RETAILCRM_API_KEY: ${{ secrets.RETAILCRM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Run sync script
        run: python sync_retailcrm_to_supabase.py
